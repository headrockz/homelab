---
services:
  homeassistant:
    container_name: hass
    image: homeassistant/home-assistant
    volumes:
      - ${DOCKER_DATA}/smart_home/hass:/config
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - smart-home
      - server-backend
    ports:
      - 8123:8123
    depends_on:
      - mqtt
    labels:
      - traefik.enable=true
      - traefik.http.routers.homeassistant.entrypoints=https
      - traefik.http.routers.homeassistant.rule=Host(`hass.${DOMAIN}`)
      - traefik.http.services.homeassistant.loadbalancer.server.scheme=https
      - traefik.http.routers.homeassistant.tls=true
      - traefik.http.services.homeassistant.loadbalancer.server.port=8123
      - traefik.http.routers.homeassistant.tls.certresolver=cloudflare
      - traefik.http.routers.homeassistant.service=homeassistant

  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ${DOCKER_DATA}/smart_home/mosquitto/data:/mosquitto/data
      - ${DOCKER_DATA}/smart_home/mosquitto/log:/mosquitto/log
    ports:
      - 1883:1883
      - 9001:9001
    networks:
      - smart-home
      - server-backend

  zigbee2mqtt:
    container_name: zigbee2mqtt
    restart: unless-stopped
    image: koenkk/zigbee2mqtt
    volumes:
      - ./zigbee:/app/data
      - ${CERTS_PATH}/certs:/certs
      - /run/udev:/run/udev:ro
    # ports:
    #   - 8080:8080
    networks:
      - smart-home
      - server-backend
    environment:
      - TZ=${TZ}
    # add usb adapter zigbee
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    depends_on:
      - mqtt
    labels:
      - traefik.enable=true
      - traefik.http.routers.zigbee2mqtt.entrypoints=https
      - traefik.http.routers.zigbee2mqtt.rule=Host(`zigbee.${DOMAIN}`)
      - traefik.http.routers.zigbee2mqtt.tls=true
      - traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080
      - traefik.http.routers.zigbee2mqtt.tls.certresolver=cloudflare
      - traefik.http.routers.zigbee2mqtt.service=zigbee2mqtt

