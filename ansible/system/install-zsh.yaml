---
- name: Install and Configure ZSH with Oh My Posh and Plugins
  hosts: "{{ hosts | default([]) }}"
  become: true

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - zsh
          - curl
          - git
          - unzip
          - tar
        state: present
        update_cache: true

    - name: Install oh-my-posh
      ansible.builtin.shell:
        cmd: |
          curl -s https://ohmyposh.dev/install.sh | bash -s

    - name: Install lazydocker
      ansible.builtin.shell:
        cmd: |
          LAZYDOCKER_VERSION="$(curl -fsSL https://api.github.com/repos/jesseduffield/lazydocker/releases/latest | sed -n 's/.*"tag_name": "v\([^"]*\)".*/\1/p' | head -n1)"
          curl -fsSL "https://github.com/jesseduffield/lazydocker/releases/latest/download/lazydocker_${LAZYDOCKER_VERSION}_Linux_{{ ansible_architecture }}.tar.gz" | tar -xz -C /tmp lazydocker
          install /tmp/lazydocker /usr/local/bin/lazydocker
          rm -f /tmp/lazydocker
      args:
        creates: /usr/local/bin/lazydocker

    - name: Install lazygit
      ansible.builtin.shell:
        cmd: |
          LAZYGIT_VERSION="$(curl -fsSL https://api.github.com/repos/jesseduffield/lazygit/releases/latest | sed -n 's/.*"tag_name": "v\([^"]*\)".*/\1/p' | head -n1)"
          curl -fsSL "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_${LAZYGIT_VERSION}_Linux_{{ ansible_architecture }}.tar.gz" | tar -xz -C /tmp lazygit
          install /tmp/lazygit /usr/local/bin/lazygit
          rm -f /tmp/lazygit
      args:
        creates: /usr/local/bin/lazygit

    - name: Create .zsh directory for plugins
      ansible.builtin.file:
        path: ".zsh"
        state: directory
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
        mode: '0755'

    - name: Clone zsh-autosuggestions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions.git
        dest: "~/.zsh/zsh-autosuggestions"
        version: master
        depth: 1
      become: true
      become_user: "{{ ansible_user_id }}"

    - name: Clone zsh-completions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-completions.git
        dest: "~/.zsh/zsh-completions"
        version: master
        depth: 1
      become: true
      become_user: "{{ ansible_user_id }}"

    - name: Clone zsh-syntax-highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "~/.zsh/zsh-syntax-highlighting"
        version: master
        depth: 1
      become: true
      become_user: "{{ ansible_user_id }}"

    - name: Clone fast-syntax-highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zdharma-continuum/fast-syntax-highlighting.git
        dest: "~/.zsh/fast-syntax-highlighting"
        version: master
        depth: 1
      become: true
      become_user: "{{ ansible_user_id }}"

    - name: Download my oh-my-posh theme
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/headrockz/mydotfiles/refs/heads/main/my_posh_config.omp.json
        dest: "~/.my_posh_config.omp.json"
        mode: '0644'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
      become: true
      become_user: "{{ ansible_user_id }}"

    - name: Copy .zshrc configuration file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/.zshrc.j2"
        dest: "~/.zshrc"
        mode: '0644'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
      become: true
      become_user: "{{ ansible_user_id }}"

    - name: Change default shell to zsh for current user
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh
