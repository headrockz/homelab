---
- name: Install automatic SSD backup sync
  hosts: "{{ hosts | default([]) }}"
  become: true

  vars:
    ssd_sync_script_path: /usr/local/bin/ssd-sync.sh
    ssd_sync_device_uuid: 1234-ABCD
    ssd_sync_mount_point: /mnt/ssd-backup
    ssd_sync_source_subdir: Photos
    ssd_sync_source_path: "{{ ssd_sync_mount_point }}/{{ ssd_sync_source_subdir }}"
    ssd_sync_raw_dest: /srv/storage/photos/raw
    ssd_sync_photo_dest: /srv/storage/photos/final
    ssd_sync_bot_token: SEU_TOKEN
    ssd_sync_chat_id: SEU_CHAT_ID
    ssd_sync_filesystem_type: exfat

  tasks:
    - name: Install backup sync dependencies
      ansible.builtin.apt:
        name:
          - rsync
          - curl
          - exfatprogs
        update_cache: true

    - name: Ensure SSD mount point exists
      ansible.builtin.file:
        path: "{{ ssd_sync_mount_point }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Install SSD sync script
      ansible.builtin.template:
        src: templates/ssd-sync.sh.j2
        dest: "{{ ssd_sync_script_path }}"
        owner: root
        group: root
        mode: '0755'

    - name: Install SSD sync systemd service
      ansible.builtin.template:
        src: templates/ssd-sync.service.j2
        dest: /etc/systemd/system/ssd-sync.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Install SSD sync udev rule
      ansible.builtin.template:
        src: templates/99-ssd-sync.rules.j2
        dest: /etc/udev/rules.d/99-ssd-sync.rules
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload udev rules
        - Trigger udev

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload udev rules
      ansible.builtin.command: udevadm control --reload-rules
      changed_when: false

    - name: Trigger udev
      ansible.builtin.command: udevadm trigger
      changed_when: false
